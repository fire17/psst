name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y -q zsh
      - name: Syntax check
        run: |
          zsh -n psst.plugin.zsh
          zsh -n lib/core.zsh
          zsh -n bin/psst
      - name: Run tests
        run: zsh tests/run_tests.zsh
